<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Couple Games</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23e11d48'><path d='M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- HOME -->
    <section id="screen-home" class="screen">
      <div class="hero">
        <div class="hero-mark">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <h1>Couple Games</h1>
        <p class="tagline">Play together, from any two phones</p>
      </div>
      <div class="card">
        <label for="name-input">Your name</label>
        <input id="name-input" type="text" maxlength="20" placeholder="e.g. Sam" autocomplete="off" />
        <button id="btn-create" class="btn btn-primary">Create a room</button>
        <div class="divider"><span>or join your partner</span></div>
        <input id="code-input" type="text" maxlength="4" placeholder="ROOM CODE" autocomplete="off" class="code-input" />
        <button id="btn-join" class="btn btn-secondary">Join room</button>
        <p id="home-error" class="error hidden"></p>
      </div>
    </section>

    <!-- WAITING FOR PARTNER -->
    <section id="screen-wait" class="screen hidden">
      <div class="card center">
        <h2>Room created</h2>
        <p>Share this code with your partner:</p>
        <div id="room-code-big" class="room-code">····</div>
        <p class="muted pulse">Waiting for them to join…</p>
      </div>
    </section>

    <!-- GAME MENU -->
    <section id="screen-menu" class="screen hidden">
      <div class="topbar">
        <span id="menu-names" class="names-chip"></span>
        <span id="menu-room" class="room-chip"></span>
      </div>
      <button id="us-card" class="us-card">
        <span class="us-heart">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </span>
        <span class="game-info">
          <span id="us-card-title" class="game-name">Us</span>
          <span id="us-card-sub" class="game-desc">Days together, stats & your story</span>
        </span>
        <span class="us-arrow">→</span>
      </button>
      <h2 class="menu-title">Pick a game</h2>
      <div class="game-list">
        <button class="game-card" data-game="wyr">
          <span class="game-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </span>
          <span class="game-info">
            <span class="game-name">Would You Rather</span>
            <span class="game-desc">Answer secretly, reveal together. Do you match?</span>
          </span>
        </button>
        <button class="game-card" data-game="tot">
          <span class="game-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </span>
          <span class="game-info">
            <span class="game-name">This or That</span>
            <span class="game-desc">Rapid-fire picks → your compatibility score</span>
          </span>
        </button>
        <button class="game-card" data-game="wkm">
          <span class="game-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </span>
          <span class="game-info">
            <span class="game-name">Who Knows Me Better?</span>
            <span class="game-desc">Guess each other's answers, newlywed-game style</span>
          </span>
        </button>
        <button class="game-card" data-game="tod">
          <span class="game-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
          </span>
          <span class="game-info">
            <span class="game-name">Truth or Dare</span>
            <span class="game-desc">Take turns — works in person or over the phone</span>
          </span>
        </button>
        <button class="game-card" data-game="q36">
          <span class="game-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          </span>
          <span class="game-info">
            <span class="game-name">36 Questions</span>
            <span class="game-desc">The famous questions that make people fall in love</span>
          </span>
        </button>
        <button class="game-card" data-game="c4">
          <span class="game-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="7" cy="7" r="2.5"/><circle cx="17" cy="7" r="2.5"/><circle cx="7" cy="17" r="2.5"/><circle cx="17" cy="17" r="2.5"/></svg>
          </span>
          <span class="game-info">
            <span class="game-name">Connect Four</span>
            <span class="game-desc">Classic head-to-head on a live shared board</span>
          </span>
        </button>
        <button class="game-card" data-game="ttt">
          <span class="game-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
          </span>
          <span class="game-info">
            <span class="game-name">Tic-Tac-Toe</span>
            <span class="game-desc">Quick rounds, alternating who goes first</span>
          </span>
        </button>
        <button class="game-card" data-game="mem">
          <span class="game-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          </span>
          <span class="game-info">
            <span class="game-name">Memory Match</span>
            <span class="game-desc">Flip pairs on a shared board — match and go again</span>
          </span>
        </button>
        <button class="game-card" data-game="rps">
          <span class="game-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 11V6a2 2 0 0 0-4 0v5"/><path d="M14 10V4a2 2 0 0 0-4 0v6"/><path d="M10 10.5V6a2 2 0 0 0-4 0v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg>
          </span>
          <span class="game-info">
            <span class="game-name">Rock Paper Scissors</span>
            <span class="game-desc">Secret picks, dramatic reveal — first to 3 wins</span>
          </span>
        </button>
      </div>
      <p id="partner-status" class="muted center-text hidden"></p>
    </section>

    <!-- US: days together + stats -->
    <section id="screen-us" class="screen hidden">
      <div class="topbar">
        <button id="btn-us-back" class="btn-link">← Back</button>
        <span id="us-room" class="room-chip"></span>
      </div>
      <div class="card center">
        <p class="kicker">Together for</p>
        <div id="us-days" class="big-score">—</div>
        <p id="us-since" class="muted"></p>
        <div id="us-set-box" class="us-set hidden">
          <label for="anniversary-input">When did you start dating?</label>
          <input id="anniversary-input" type="date" />
          <button id="btn-set-anniversary" class="btn btn-primary">Save our date</button>
        </div>
        <button id="btn-edit-anniversary" class="btn-link hidden">Edit date</button>
      </div>
      <div class="card">
        <h2>Our stats</h2>
        <div id="us-stats" class="stats-list"></div>
        <p class="muted">Stats are saved on both your phones and sync whenever you play together.</p>
      </div>
    </section>

    <!-- PLAYING -->
    <section id="screen-play" class="screen hidden">
      <div class="topbar">
        <button id="btn-quit" class="btn-link">← Menu</button>
        <span id="play-progress" class="room-chip"></span>
      </div>
      <div class="card">
        <p id="play-kicker" class="kicker"></p>
        <h2 id="play-question"></h2>
        <div id="play-options" class="options"></div>
        <p id="play-status" class="muted center-text"></p>
        <div id="reveal-box" class="reveal hidden">
          <div id="reveal-verdict" class="verdict"></div>
          <div id="reveal-answers" class="reveal-answers"></div>
          <button id="btn-next" class="btn btn-primary">Next →</button>
        </div>
      </div>
    </section>

    <!-- CONNECT FOUR -->
    <section id="screen-c4" class="screen hidden">
      <div class="topbar">
        <button id="btn-c4-quit" class="btn-link">← Menu</button>
        <span id="c4-chip" class="room-chip">Connect Four</span>
      </div>
      <div class="card center">
        <p id="c4-status" class="kicker"></p>
        <div id="c4-board" class="c4-board"></div>
        <p id="c4-legend" class="muted"></p>
        <div id="c4-actions" class="c4-actions hidden">
          <button id="btn-c4-again" class="btn btn-primary">Rematch</button>
          <button id="btn-c4-menu" class="btn btn-secondary">Back to menu</button>
        </div>
      </div>
    </section>

    <!-- RESULTS -->
    <section id="screen-results" class="screen hidden">
      <div class="card center">
        <h2 id="results-title"></h2>
        <div id="results-big" class="big-score"></div>
        <p id="results-detail" class="muted"></p>
        <button id="btn-again" class="btn btn-primary">Play again</button>
        <button id="btn-menu" class="btn btn-secondary">Back to menu</button>
      </div>
    </section>

  </div>
  <div id="toast" class="toast hidden"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
